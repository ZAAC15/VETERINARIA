<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body class="fondo-dashboard">

<!-- SPLINE JAKE -->
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.73/build/spline-viewer.js"></script>

<spline-viewer 
  class="spline-dashboard"
  url="https://prod.spline.design/OPlBEvQwSlQASwqG/scene.splinecode">
</spline-viewer>

<div class="d-flex contenido-dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar text-white p-4">

    <div class="text-center mb-4">
      <img src="logo-vet.png" style="width:70px">
      <h5 class="mt-2">Veterinaria</h5>
    </div>

    <button class="btn btn-outline-light w-100 mb-2" onclick="cargarVista('mascotas')">Mascotas</button>
    <button class="btn btn-outline-light w-100 mb-2" onclick="cargarVista('propietarios')">Propietarios</button>
    <button class="btn btn-outline-light w-100 mb-2" onclick="cargarVista('veterinarios')">Veterinarios</button>

    <hr>

    <button class="btn btn-danger w-100" onclick="cerrarSesion()">Salir</button>

  </div>

  <!-- CONTENIDO -->
  <div class="p-4 w-100" id="contenido"></div>

</div>

<!-- ===== TEMPLATES ===== -->

<template id="filaMascota">
  <tr>
    <td class="n"></td>
    <td class="e"></td>
    <td class="t"></td>
    <td>
      <button class="btn btn-danger btn-sm eliminar">Eliminar</button>
    </td>
  </tr>
</template>

<template id="filaProp">
  <tr>
    <td class="n"></td>
    <td class="t"></td>
    <td>
      <button class="btn btn-danger btn-sm eliminar">Eliminar</button>
    </td>
  </tr>
</template>

<template id="filaVet">
  <tr>
    <td class="n"></td>
    <td class="e"></td>
    <td>
      <button class="btn btn-danger btn-sm eliminar">Eliminar</button>
    </td>
  </tr>
</template>

<script src="js/app.js"></script>

</body>
</html>
