<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Veterinaria</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body class="fondo-login">

<!-- SPLINE -->
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.73/build/spline-viewer.js"></script>

<spline-viewer 
  class="spline-login"
  url="https://prod.spline.design/OPlBEvQwSlQASwqG/scene.splinecode">
</spline-viewer>

<!-- LOGIN -->
<div class="contenedor-login">

  <div class="card-login p-4">

    <div class="text-center mb-3">
      <img src="logo-vet.png" style="width:80px">
    </div>

    <h4 class="text-center fw-bold">Veterinaria App</h4>

    <input type="text" id="usuario" class="form-control my-2" placeholder="Usuario">
    <input type="password" id="clave" class="form-control my-2" placeholder="Contraseña">

    <button class="btn btn-primary w-100 mt-2" onclick="iniciarSesion()">Ingresar</button>

    <p id="error" class="text-danger text-center mt-2"></p>

  </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
